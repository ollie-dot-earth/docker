volumes: 
  grafana-storage:
networks:
  grafana:
  proxy:
    external: true

services:
  grafana: # ------------------------------------------------------ grafana
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.ollie.earth/
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_RENDERING_RENDERER_TOKEN=${GF_RENDERING_RENDERER_TOKEN}
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - grafana
      - proxy
    ports:
      - "3000:3000"
    labels:
      caddy_0: grafana.ollie.earth
      caddy_0.reverse_proxy: "{{upstreams 3000}}"
    healthcheck: # ------------------------------------------------ health
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  renderer: # ----------------------------------------------------- renderer
    image: grafana/grafana-image-renderer:latest
    container_name: renderer
    restart: unless-stopped
    environment:
      - GF_RENDERING_RENDERER_TOKEN=${GF_RENDERING_RENDERER_TOKEN}
    networks:
      - grafana
  
  prometheus: # --------------------------------------------------- prometheus
    image: prom/prometheus:v3
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config:/etc/prometheus
    networks:
      - proxy
      - grafana

  alloy: # -------------------------------------------------------- alloy
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    volumes:
      - ./config/alloy.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - grafana

  loki: # --------------------------------------------------------- loki
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml
    command: "-config.file=/etc/loki/config.yaml -target=all"
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - grafana
